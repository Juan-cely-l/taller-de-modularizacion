<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MicroSpringBoot</title>
</head>
<body>
    <h1>MicroSpringBoot - Application Server</h1>
    <p>Minimal HTTP server built with plain Java.</p>

    <h2>Available endpoints</h2>
    <ul>
        <li><a href="/">GET /</a> - Main greeting</li>
        <li><a href="/hello">GET /hello</a> - Hello World</li>
        <li><a href="/pi">GET /pi</a> - Pi value</li>
        <li><a href="/greeting?name=YourName">GET /greeting?name=YourName</a></li>
    </ul>

    <h2>PNG image (static resource)</h2>
    <img src="/logo.png" alt="Logo" style="max-width:200px" />
</body>
</html>
